name: Update Stats SVGs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/generate_matrix.py'
      - 'scripts/generate_mdr.py'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate SVGs
        run: |
          python scripts/generate_matrix.py
          python scripts/generate_mdr.py
          python -c "
          import random, shutil
          style = random.choice(['matrix', 'mdr'])
          print(f'Selected style: {style}')
          shutil.copy(f'assets/{style}-stats-dark.svg', 'assets/stats-dark.svg')
          shutil.copy(f'assets/{style}-stats-light.svg', 'assets/stats-light.svg')
          "
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}

      - name: Commit & push
        run: |
          git config user.name  'Jacob Freck'
          git config user.email 'jafreck@outlook.com'
          git add assets/*.svg
          git diff --cached --quiet || (git commit -m 'chore: update stats svgs' && git push)
