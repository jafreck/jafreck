name: Update Matrix Stats

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/generate_matrix.py'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate SVG
        run: python scripts/generate_matrix.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT || github.token }}

      - name: Commit & push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add assets/matrix-stats-dark.svg assets/matrix-stats-light.svg
          git diff --cached --quiet || (git commit -m 'chore: update matrix stats' && git push)
