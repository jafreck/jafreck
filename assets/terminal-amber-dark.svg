<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 850 802" font-family="'Courier New', 'Consolas', 'Liberation Mono', monospace">
<defs>
<pattern id="scanlines" patternUnits="userSpaceOnUse" width="100%" height="4">
<rect width="100%" height="2" fill="black" opacity="0.10"/>
</pattern>
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="2.0" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="textglow" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur stdDeviation="1.0" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="innershadow" x="-5%" y="-5%" width="110%" height="110%"><feComponentTransfer in="SourceAlpha"><feFuncA type="table" tableValues="1 0"/></feComponentTransfer><feGaussianBlur stdDeviation="6"/><feOffset dx="0" dy="2" result="offsetblur"/><feFlood flood-color="#000000" flood-opacity="0.5" result="color"/><feComposite in2="offsetblur" operator="in"/><feComposite in2="SourceAlpha" operator="in"/><feMerge><feMergeNode in="SourceGraphic"/><feMergeNode/></feMerge></filter>
</defs>
<style>

      .bg { fill: #0a0800; }
      .term-text {
        font-family: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
        font-size: 14px;
        fill: #FFB000;
        filter: url(#textglow);
      }
      .term-prompt {
        font-family: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
        font-size: 14px;
        fill: #FFB000;
        font-weight: bold;
        filter: url(#textglow);
      }
      .term-header {
