        fill: #CC8C00;
        filter: url(#textglow);
      }
      .term-boot-ok {
        font-family: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
        font-size: 14px;
        fill: #FFB000;
        font-weight: bold;
        filter: url(#textglow);
      }
      .term-ascii {
        font-family: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
        font-size: 14px;
        fill: #FFD060;
        filter: url(#textglow);
      }
      .term-greeting {
        font-family: 'Courier New', 'Consolas', 'Liberation Mono', monospace;
        font-size: 26px;
        fill: #FFD060;
        font-weight: bold;
        filter: url(#textglow);
      }

      /* Cursor blink */
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      .cursor {
        fill: #FFB000;
        animation: blink 1s step-end infinite;
      }
      /* Line reveal */
      @keyframes lineReveal {
        0% { opacity: 0; transform: translateX(-4px); }
        100% { opacity: 1; transform: translateX(0); }
      }

      /* Character typing via clip-path */
      @keyframes typeClip {
        0% { clip-path: inset(0 100% 0 0); }
        100% { clip-path: inset(0 0% 0 0); }
      }

      /* More pronounced CRT flicker with occasional brightness dip */
      @keyframes crtFlicker {
        0%   { opacity: 1; }
        15%  { opacity: 1; }
        16%  { opacity: 0.82; }
        17%  { opacity: 1; }
        42%  { opacity: 1; }
        43%  { opacity: 0.88; }
        44%  { opacity: 0.78; }
        45%  { opacity: 1; }
        70%  { opacity: 1; }
        71%  { opacity: 0.90; }
        72%  { opacity: 1; }
        90%  { opacity: 1; }
        91%  { opacity: 0.85; }
        92%  { opacity: 0.92; }
        93%  { opacity: 1; }
        100% { opacity: 1; }
      }
      .crt-wrap {
        animation: crtFlicker 3s infinite;
      }

      /* Scanline pattern scroll */
      @keyframes scanScroll {
        0%   { transform: translateY(0); }
        100% { transform: translateY(4px); }
      }
      .scanline-layer {
        animation: scanScroll 0.15s linear infinite;
      }

      /* Scrolling bright scanline bar */
      @keyframes scanBar {
        0%   { transform: translateY(-4px); }
        100% { transform: translateY(806px); }
      }
      .scan-bar {
        animation: scanBar 6s linear infinite;
      }
    

      .line-0 {
        opacity: 0;
        animation: lineReveal 0.05s ease-out 0.00s forwards;
      }
      .line-0 .typed {
        clip-path: inset(0 100% 0 0);
        animation: typeClip 0.30s steps(30) 0.00s forwards;
      }
    

      .line-1 {
        opacity: 0;
